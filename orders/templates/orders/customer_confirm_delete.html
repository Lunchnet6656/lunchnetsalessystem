{% extends "orders/base.html" %}
{% block title %}顧客削除確認 - 受注管理{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-lg shadow-sm p-6">
        <h1 class="text-xl font-bold text-red-600 mb-4">顧客を無効にしますか？</h1>
        <p class="text-gray-700 mb-6">
            顧客「<strong>{{ customer }}</strong>」を無効にします。<br>
            <span class="text-sm text-gray-500">既存の受注データは保持されます。</span>
        </p>
        <form method="post">
            {% csrf_token %}
            <div class="flex gap-3">
                <button type="submit"
                        class="flex-1 bg-red-600 text-white py-2.5 rounded-lg hover:bg-red-700 transition font-medium">
                    無効にする
                </button>
                <a href="{% url 'orders:customer_detail' customer.pk %}"
                   class="flex-1 bg-gray-200 text-gray-700 py-2.5 rounded-lg hover:bg-gray-300 transition text-center font-medium">
                    キャンセル
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
